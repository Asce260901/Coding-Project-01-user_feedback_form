<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tooltip" class="tooltip"></div>

    <h1>User Feedback Form</h1>

    <form id="feedback-form">

        <div class="form-group" data-tooltip="Enter your full name.">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" autocomplete="off">
            <span class="validation-msg" id="name-err"></span>
        </div>

        <div class="form-group" data-tooltip="Enter a valid email address.">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" autocomplete="off">
            <span class="validation-msg" id="email-err"></span>
        </div>

        <div class="form-group" data-tooltip="Share your feedback (max 600 characters).">
            <label for="feedback">Feedback:</label>
            <textarea id="feedback" name="feedback" rows="5" maxlength="600"></textarea>
            <div class="counter-row">
                <span class="validation-msg" id="feedback-err"></span>
                <span id="feedback-count">0 / 600</span>
            </div>
        </div>

        <button type="submit" id="submitbtn">Submit</button>

    </form>

    <div id="feedback-display"></div>

    <script src="cp_1.js"></script>
</body>
</html>
